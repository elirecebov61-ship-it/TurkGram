name: Build release APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: "10G"
      CCACHE_HARDLINK: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: DamianReeves/write-file-action@master
        with:
          path: ./API_KEYS
          contents: |
            APP_ID = 6
            APP_HASH = "eb06d4abfb49dc3eeb1aeb98ae0f581e"
            MAPS_V2_API = "${{ secrets.MAPS_KEY }}"

            SIGNING_KEY_PASSWORD = "${{ secrets.CERT_KEY }}"
            SIGNING_KEY_ALIAS = "turkgram"
            SIGNING_KEY_STORE_PASSWORD = "${{ secrets.CERT_KEY }}"
          write-mode: overwrite


      - name: Debug secret length
        run: |
          echo "CERT_KEY length: ${#CERT_KEY}"
        env:
          CERT_KEY: ${{ secrets.CERT_KEY }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Cache Gradle Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
            ~/.gradle/buildOutputCleanup/cache.properties
          key: gradle-builds-${{ github.sha }}
          restore-keys: |
            gradle-builds-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}
          restore-keys: |
            ccache-${{ runner.os }}
          max-size: 2G

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleAfatRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Release-APK
          path: TMessagesProj/build/outputs/apk/afat/release/*.apk
